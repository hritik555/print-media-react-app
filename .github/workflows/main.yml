name: Deploy React App to Netlify

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch uses that name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # FIX 1: Updated to Node 22 to satisfy @netlify/vite-plugin-tanstack-start
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm install # FIX 2: Changed from 'npm ci' to resolve cross-platform binary issues

      # Step 4: Build the production application
      - name: Build Application
        run: npm run build
        env:
          CI: false

      # Step 5: Deploy the build directory to Netlify
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist' # Updated to 'dist' as Vite is being used
          production-deploy: true
          netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          site-id: ${{ secrets.NETLIFY_SITE_ID }}
